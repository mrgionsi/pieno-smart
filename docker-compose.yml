services:
  db:
    image: postgis/postgis:18-3.6
    container_name: pienosmart-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pienosmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pienosmart_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pienosmart"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pienosmart_pgdata:
