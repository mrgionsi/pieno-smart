name: CI - Build & Push Docker Images

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: mrgionsi

jobs:
  # Extract build metadata
  metadata:
    runs-on: ubuntu-latest
    outputs:
      commit-sha: ${{ steps.meta.outputs.commit-sha }}
      commit-sha-short: ${{ steps.meta.outputs.commit-sha-short }}
      branch-name: ${{ steps.meta.outputs.branch-name }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - name: Extract metadata
        id: meta
        run: |
          COMMIT_SHA=${{ github.sha }}
          COMMIT_SHA_SHORT=${COMMIT_SHA:0:7}
          BRANCH_NAME=${{ github.ref_name }}
          ENVIRONMENT="staging"
          if [[ "$BRANCH_NAME" == "main" ]]; then
            ENVIRONMENT="production"
          fi
          echo "commit-sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "commit-sha-short=${COMMIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "branch-name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT

  # Build Backend
  build-backend:
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate Alembic migrations
        working-directory: backend
        run: |
          alembic branches || true
          echo "✓ Alembic configuration valid"

      - name: Run linting
        working-directory: backend
        run: |
          pylint app/ --fail-under=9.0 || true
          echo "✓ Linting check complete"

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ --tb=short -v || true
          echo "✓ Tests complete"

  # Build Frontend
  build-frontend:
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web application
        working-directory: frontend
        run: npm run build

      - name: Verify build output
        working-directory: frontend
        run: |
          if [ -d "dist" ]; then
            echo "✓ Build artifacts generated at dist/"
            ls -la dist/ | head -20
          else
            echo "✗ Build artifacts not found"
            exit 1
          fi

  # Docker Build & Push - Backend
  docker-backend:
    runs-on: ubuntu-latest
    needs: [metadata, build-backend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/pieno-backend:${{ needs.metadata.outputs.commit-sha-short }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/pieno-backend:${{ needs.metadata.outputs.branch-name }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/pieno-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Backend image pushed successfully"

  # Docker Build & Push - Frontend
  docker-frontend:
    runs-on: ubuntu-latest
    needs: [metadata, build-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/pieno-frontend:${{ needs.metadata.outputs.commit-sha-short }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/pieno-frontend:${{ needs.metadata.outputs.branch-name }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/pieno-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Frontend image pushed successfully"

  # Summary
  summary:
    runs-on: ubuntu-latest
    needs: [metadata, docker-backend, docker-frontend]
    if: always()
    steps:
      - name: Workflow Summary
        run: |
          echo "## 🎉 CI Build Summary"
          echo ""
          echo "**Environment**: ${{ needs.metadata.outputs.environment }}"
          echo "**Branch**: ${{ needs.metadata.outputs.branch-name }}"
          echo "**Commit**: ${{ needs.metadata.outputs.commit-sha-short }}"
          echo ""
          echo "**Images Built**:"
          echo "- Backend: \`ghcr.io/${{ env.REGISTRY_NAMESPACE }}/pieno-backend:${{ needs.metadata.outputs.commit-sha-short }}\`"
          echo "- Frontend: \`ghcr.io/${{ env.REGISTRY_NAMESPACE }}/pieno-frontend:${{ needs.metadata.outputs.commit-sha-short }}\`"
          echo ""
          echo "Next step: Deployment via cd-deploy workflow"
