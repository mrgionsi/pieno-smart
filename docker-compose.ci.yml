version: '3.8'

services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: pienosmart-db-ci
    restart: unless-stopped
    environment:
      POSTGRES_DB: pienosmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pienosmart_pgdata_ci:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pienosmart"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pienosmart-ci

volumes:
  pienosmart_pgdata_ci:

networks:
  pienosmart-ci:
    driver: bridge